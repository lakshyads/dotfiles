# ~/.config/starship.toml
# Starship prompt config: minimal but informative.
# Shows directory, git state, language versions (when in a project), and command duration.

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "yellow"

[python]
symbol = " "
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
style = "yellow"

[nodejs]
symbol = " "
format = '[$symbol($version )]($style)'
style = "green"

[golang]
symbol = " "
format = '[$symbol($version )]($style)'
style = "cyan"
